# LUMEN MQTT Broker Configuration

# Basic settings
listener 1883
protocol mqtt

# Allow anonymous connections (for ESP32 devices)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type information
log_type subscribe

# Connection settings
max_keepalive 300
max_inflight_messages 20
max_queued_messages 1000

# For WebSocket (optional)
listener 9001
protocol websockets