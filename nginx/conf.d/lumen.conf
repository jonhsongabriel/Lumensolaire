# LUMEN Production Configuration
# Reverse proxy for Frontend (static) + Backend API + MQTT WebSocket

upstream backend_api {
  server backend:9000;
  keepalive 32;
}

upstream backend_ws {
  server backend:9000;
  keepalive 32;
}

# HTTP → HTTPS redirect (production only, uncomment when SSL is ready)
# server {
#   listen 80;
#   listen [::]:80;
#   server_name lumen.example.com;
#   return 301 https://$server_name$request_uri;
# }

server {
  listen 80;
  listen [::]:80;
  server_name localhost lumen.local;

  # Root for static frontend build
  root /var/www/lumen;
  index index.html;

  # ── Security ──
  server_tokens off;

  # ── Static Frontend (React SPA) ──
  location / {
    try_files $uri $uri/ /index.html;
    expires 1h;
    add_header Cache-Control "public, immutable";
  }

  # Assets with long cache
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
    expires 6M;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── Backend API Proxy ──
  location /api/ {
    limit_req zone=api burst=20 nodelay;

    proxy_pass http://backend_api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # CORS (optional - backend already handles it)
    add_header Access-Control-Allow-Origin "$http_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  # ── WebSocket Proxy (for real-time MQTT/MQTT over WS if needed) ──
  location /ws/ {
    proxy_pass http://backend_ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  # ── MQTT WebSocket (optional, for browser-based MQTT) ──
  location /mqtt/ {
    proxy_pass http://mosquitto:9001/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }

  # ── Health check endpoint ──
  location /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # ── Block hidden files ──
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # ── Error pages ──
  error_page 404 /index.html;
  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /var/www/errors;
    internal;
  }
}

